services:
  postgres-catalogos:
    image: postgres:16-alpine
    container_name: postgres-catalogos
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_catalogos_data:/var/lib/postgresql/data
      - ./ms-catalogos/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./ms-catalogos/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-inventario:
    image: postgres:16-alpine
    container_name: postgres-inventario
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_INVENTARIO_USER}
      POSTGRES_PASSWORD: ${POSTGRES_INVENTARIO_PASSWORD}
      POSTGRES_DB: ${POSTGRES_INVENTARIO_DB}
    ports:
      - "${POSTGRES_INVENTARIO_PORT}:5432"
    volumes:
      - postgres_inventario_data:/var/lib/postgresql/data
      - ./ms-inventario/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_INVENTARIO_USER} -d ${POSTGRES_INVENTARIO_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
    ports:
      - "${POSTGRES_AUTH_PORT}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./ms-auth/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./ms-auth/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-compras:
    image: postgres:16-alpine
    container_name: postgres-compras
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_COMPRAS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_COMPRAS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_COMPRAS_DB}
    ports:
      - "${POSTGRES_COMPRAS_PORT}:5432"
    volumes:
      - postgres_compras_data:/var/lib/postgresql/data
      - ./ms-compras/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_COMPRAS_USER} -d ${POSTGRES_COMPRAS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-ventas:
    image: postgres:16-alpine
    container_name: postgres-ventas
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_VENTAS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_VENTAS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_VENTAS_DB}
    ports:
      - "${POSTGRES_VENTAS_PORT}:5432"
    volumes:
      - postgres_ventas_data:/var/lib/postgresql/data
      - ./ms-ventas/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_VENTAS_USER} -d ${POSTGRES_VENTAS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-finanzas:
    image: postgres:16-alpine
    container_name: postgres-finanzas
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_FINANZAS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_FINANZAS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_FINANZAS_DB}
    ports:
      - "${POSTGRES_FINANZAS_PORT}:5432"
    volumes:
      - postgres_finanzas_data:/var/lib/postgresql/data
      - ./ms-finanzas/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_FINANZAS_USER} -d ${POSTGRES_FINANZAS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-reportes:
    image: postgres:16-alpine
    container_name: postgres-reportes
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_REPORTES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_REPORTES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_REPORTES_DB}
    ports:
      - "${POSTGRES_REPORTES_PORT}:5432"
    volumes:
      - postgres_reportes_data:/var/lib/postgresql/data
      - ./ms-reportes/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_REPORTES_USER} -d ${POSTGRES_REPORTES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-company:
    image: postgres:16-alpine
    container_name: postgres-company
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_COMPANY_USER}
      POSTGRES_PASSWORD: ${POSTGRES_COMPANY_PASSWORD}
      POSTGRES_DB: ${POSTGRES_COMPANY_DB}
    ports:
      - "${POSTGRES_COMPANY_PORT}:5432"
    volumes:
      - postgres_company_data:/var/lib/postgresql/data
      - ./ms-company/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_COMPANY_USER} -d ${POSTGRES_COMPANY_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-clientes:
    image: postgres:16-alpine
    container_name: postgres-clientes
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_CLIENTES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_CLIENTES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_CLIENTES_DB}
    ports:
      - "${POSTGRES_CLIENTES_PORT}:5432"
    volumes:
      - postgres_clientes_data:/var/lib/postgresql/data
      - ./ms-clientes/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CLIENTES_USER} -d ${POSTGRES_CLIENTES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-notificaciones:
    image: postgres:16-alpine
    container_name: postgres-notificaciones
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_NOTIFICACIONES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_NOTIFICACIONES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NOTIFICACIONES_DB}
    ports:
      - "${POSTGRES_NOTIFICACIONES_PORT}:5432"
    volumes:
      - postgres_notificaciones_data:/var/lib/postgresql/data
      - ./ms-notificaciones/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_NOTIFICACIONES_USER} -d ${POSTGRES_NOTIFICACIONES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-chatbot:
    image: postgres:16-alpine
    container_name: postgres-chatbot
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_CHATBOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_CHATBOT_PASSWORD}
      POSTGRES_DB: ${POSTGRES_CHATBOT_DB}
    ports:
      - "${POSTGRES_CHATBOT_PORT}:5432"
    volumes:
      - postgres_chatbot_data:/var/lib/postgresql/data
      - ./ms-chatbot/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CHATBOT_USER} -d ${POSTGRES_CHATBOT_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms-catalogos:
    build:
      context: ./ms-catalogos
      dockerfile: Dockerfile
    container_name: ms-catalogos
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-catalogos:5432/${POSTGRES_DB}
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "${MS_CATALOGOS_PORT}:8001"
    depends_on:
      postgres-catalogos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ms-inventario:
    build:
      context: ./ms-inventario
      dockerfile: Dockerfile
    container_name: ms-inventario
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_INVENTARIO_USER}:${POSTGRES_INVENTARIO_PASSWORD}@postgres-inventario:5432/${POSTGRES_INVENTARIO_DB}
      SERVICE_NAME: ms-inventario
      RUN_SEED: "true"
      MS_CATALOGOS_URL: http://ms-catalogos:8001
      MS_COMPANY_URL: http://ms-company:8008
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "${MS_INVENTARIO_PORT}:8002"
    depends_on:
      postgres-inventario:
        condition: service_healthy
      ms-catalogos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ms-auth:
    build:
      context: ./ms-auth
      dockerfile: Dockerfile
    container_name: ms-auth
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_AUTH_USER}:${POSTGRES_AUTH_PASSWORD}@postgres-auth:5432/${POSTGRES_AUTH_DB}
      SERVICE_NAME: ms-auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      RUN_SEED: "true"
    ports:
      - "${MS_AUTH_PORT}:8003"
    depends_on:
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ms-finanzas:
    build:
      context: ./ms-finanzas
      dockerfile: Dockerfile
    container_name: ms-finanzas
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_FINANZAS_USER}:${POSTGRES_FINANZAS_PASSWORD}@postgres-finanzas:5432/${POSTGRES_FINANZAS_DB}
      SERVICE_NAME: ms-finanzas
      RUN_SEED: "true"
    ports:
      - "${MS_FINANZAS_PORT}:8006"
    depends_on:
      postgres-finanzas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ms-compras:
    build:
      context: ./ms-compras
      dockerfile: Dockerfile
    container_name: ms-compras
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_COMPRAS_USER}:${POSTGRES_COMPRAS_PASSWORD}@postgres-compras:5432/${POSTGRES_COMPRAS_DB}
      SERVICE_NAME: ms-compras
      RUN_SEED: "true"
      MS_CATALOGOS_URL: http://ms-catalogos:8001
      MS_INVENTARIO_URL: http://ms-inventario:8002
      MS_FINANZAS_URL: http://ms-finanzas:8006
    ports:
      - "${MS_COMPRAS_PORT}:8004"
    depends_on:
      postgres-compras:
        condition: service_healthy
      ms-inventario:
        condition: service_healthy
      ms-finanzas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  ms-ventas:
    build:
      context: ./ms-ventas
      dockerfile: Dockerfile
    container_name: ms-ventas
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_VENTAS_USER}:${POSTGRES_VENTAS_PASSWORD}@postgres-ventas:5432/${POSTGRES_VENTAS_DB}
      SERVICE_NAME: ms-ventas
      RUN_SEED: "true"
      MS_CATALOGOS_URL: http://ms-catalogos:8001
      MS_INVENTARIO_URL: http://ms-inventario:8002
      MS_FINANZAS_URL: http://ms-finanzas:8006
      MS_CLIENTES_URL: http://ms-clientes:8009
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "${MS_VENTAS_PORT}:8005"
    depends_on:
      postgres-ventas:
        condition: service_healthy
      ms-inventario:
        condition: service_healthy
      ms-finanzas:
        condition: service_healthy
      ms-clientes:
        condition: service_healthy
      ms-catalogos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  ms-reportes:
    build:
      context: ./ms-reportes
      dockerfile: Dockerfile
    container_name: ms-reportes
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_REPORTES_USER}:${POSTGRES_REPORTES_PASSWORD}@postgres-reportes:5432/${POSTGRES_REPORTES_DB}
      SERVICE_NAME: ms-reportes
      MS_CATALOGOS_URL: http://ms-catalogos:8001
      MS_INVENTARIO_URL: http://ms-inventario:8002
      MS_COMPRAS_URL: http://ms-compras:8004
      MS_VENTAS_URL: http://ms-ventas:8005
      MS_FINANZAS_URL: http://ms-finanzas:8006
    ports:
      - "${MS_REPORTES_PORT}:8007"
    depends_on:
      postgres-reportes:
        condition: service_healthy
      ms-catalogos:
        condition: service_healthy
      ms-inventario:
        condition: service_healthy
      ms-compras:
        condition: service_healthy
      ms-ventas:
        condition: service_healthy
      ms-finanzas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 25s

  ms-company:
    build:
      context: ./ms-company
      dockerfile: Dockerfile
    container_name: ms-company
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_COMPANY_USER}:${POSTGRES_COMPANY_PASSWORD}@postgres-company:5432/${POSTGRES_COMPANY_DB}
      SERVICE_NAME: ms-company
      RUN_SEED: "true"
    ports:
      - "${MS_COMPANY_PORT}:8008"
    depends_on:
      postgres-company:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ms-clientes:
    build:
      context: ./ms-clientes
      dockerfile: Dockerfile
    container_name: ms-clientes
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_CLIENTES_USER}:${POSTGRES_CLIENTES_PASSWORD}@postgres-clientes:5432/${POSTGRES_CLIENTES_DB}
      SERVICE_NAME: ms-clientes
      RUN_SEED: "true"
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "${MS_CLIENTES_PORT}:8009"
    depends_on:
      postgres-clientes:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  ms-notificaciones:
    build:
      context: ./ms-notificaciones
      dockerfile: Dockerfile
    container_name: ms-notificaciones
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_NOTIFICACIONES_USER}:${POSTGRES_NOTIFICACIONES_PASSWORD}@postgres-notificaciones:5432/${POSTGRES_NOTIFICACIONES_DB}
      SERVICE_NAME: ms-notificaciones
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "${MS_NOTIFICACIONES_PORT}:8010"
    depends_on:
      postgres-notificaciones:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 25s

  ms-chatbot:
    build:
      context: ./ms-chatbot
      dockerfile: Dockerfile
    container_name: ms-chatbot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_CHATBOT_USER}:${POSTGRES_CHATBOT_PASSWORD}@postgres-chatbot:5432/${POSTGRES_CHATBOT_DB}
      SERVICE_NAME: ms-chatbot
      MS_CATALOGOS_URL: http://ms-catalogos:8001
      MS_INVENTARIO_URL: http://ms-inventario:8002
      MS_COMPANY_URL: http://ms-company:8008
      MS_VENTAS_URL: http://ms-ventas:8005
      WHATSAPP_CLIENTE_ID: ${WHATSAPP_CLIENTE_ID}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      TUNNEL_LOG_PATH: /tunnel/chatbot.log
    ports:
      - "${MS_CHATBOT_PORT}:8011"
    volumes:
      - tunnel_chatbot_data:/tunnel:ro
    depends_on:
      postgres-chatbot:
        condition: service_healthy
      ms-catalogos:
        condition: service_healthy
      ms-inventario:
        condition: service_healthy
      ms-company:
        condition: service_healthy
      ms-ventas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  tunnel-chatbot:
    image: cloudflare/cloudflared:latest
    container_name: tunnel-chatbot
    user: root
    restart: unless-stopped
    command: tunnel --url http://ms-chatbot:8011 --loglevel info --logfile /tunnel/chatbot.log
    volumes:
      - tunnel_chatbot_data:/tunnel
    depends_on:
      ms-chatbot:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MS_CATALOGOS_URL: http://ms-catalogos:8001
      MS_INVENTARIO_URL: http://ms-inventario:8002
      MS_AUTH_URL: http://ms-auth:8003
      MS_COMPRAS_URL: http://ms-compras:8004
      MS_VENTAS_URL: http://ms-ventas:8005
      MS_FINANZAS_URL: http://ms-finanzas:8006
      MS_REPORTES_URL: http://ms-reportes:8007
      MS_COMPANY_URL: http://ms-company:8008
      MS_CLIENTES_URL: http://ms-clientes:8009
      MS_NOTIFICACIONES_URL: http://ms-notificaciones:8010
      MS_CHATBOT_URL: http://ms-chatbot:8011
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    ports:
      - "${API_GATEWAY_PORT}:8000"
    depends_on:
      ms-catalogos:
        condition: service_healthy
      ms-inventario:
        condition: service_healthy
      ms-auth:
        condition: service_healthy
      ms-compras:
        condition: service_healthy
      ms-ventas:
        condition: service_healthy
      ms-finanzas:
        condition: service_healthy
      ms-reportes:
        condition: service_healthy
      ms-company:
        condition: service_healthy
      ms-clientes:
        condition: service_healthy
      ms-notificaciones:
        condition: service_healthy
      ms-chatbot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  tunnel_chatbot_data:
  postgres_catalogos_data:
  postgres_inventario_data:
  postgres_auth_data:
  postgres_compras_data:
  postgres_ventas_data:
  postgres_finanzas_data:
  postgres_reportes_data:
  postgres_company_data:
  postgres_clientes_data:
  postgres_notificaciones_data:
  postgres_chatbot_data:
